# Absolute path: Spotlight/Dock launches don't have /opt/homebrew/bin on PATH
shell /opt/homebrew/bin/tmux new-session -A -s default

# Cmd-driven tmux control — browser-style tabs, no prefix chord needed.
# \x01 is the Ctrl-a prefix byte, so each map sends "prefix + key" to tmux.
# Windows (tabs)
map cmd+t        send_text all \x01c
map cmd+1        send_text all \x011
map cmd+2        send_text all \x012
map cmd+3        send_text all \x013
map cmd+4        send_text all \x014
map cmd+5        send_text all \x015
map cmd+6        send_text all \x016
map cmd+7        send_text all \x017
map cmd+8        send_text all \x018
map cmd+9        send_text all \x019
map cmd+shift+]  send_text all \x01n
map cmd+shift+[  send_text all \x01p
# cmd+shift+w kills the whole tab; cmd+w (below) kills just the current pane
map cmd+shift+w  send_text all \x01&
# Panes — cmd+n splits side-by-side, cmd+shift+n splits below (tmux `bind |` / `bind -`)
map cmd+n        send_text all \x01|
map cmd+shift+n  send_text all \x01-
# cmd+w kills the current pane (tmux `bind x`); on a lone pane this closes the tab too
map cmd+w        send_text all \x01x
map cmd+h        send_text all \x01h
map cmd+j        send_text all \x01j
map cmd+k        send_text all \x01k
map cmd+l        send_text all \x01l

# JetBrainsMono NF is a Nerd Font build — icons included, no symbol_map needed
font_family      JetBrainsMono NF
bold_font        JetBrainsMono NF Bold
italic_font      JetBrainsMono NF Italic
bold_italic_font JetBrainsMono NF Bold Italic
font_size        16.0
modify_font cell_height 110%

window_padding_width 12
scrollback_lines 10000
confirm_os_window_close 0

# tmux owns sessions/windows — hide Kitty's own tab bar
tab_bar_style hidden

# AeroSpace manages windows — no titlebar needed (needs full kitty restart to apply)
hide_window_decorations titlebar-only

# Gruvbox Material (dark, medium)
background            #282828
foreground            #d4be98
selection_background  #45403d
selection_foreground  #d4be98
cursor                #d4be98
cursor_text_color     #282828

# Normal colors
color0  #665c54
color1  #ea6962
color2  #a9b665
color3  #d8a657
color4  #7daea3
color5  #d3869b
color6  #89b482
color7  #d4be98

# Bright colors
color8  #928374
color9  #ea6962
color10 #a9b665
color11 #d8a657
color12 #7daea3
color13 #d3869b
color14 #89b482
color15 #d4be98
