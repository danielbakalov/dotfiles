# Absolute path: Spotlight/Dock launches don't have /opt/homebrew/bin on PATH
shell /opt/homebrew/bin/tmux new-session -A -s default

font_family      iA Writer Mono V
bold_font        iA Writer Mono V Bold
font_size        14.0
symbol_map U+E000-U+E00A,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6AA,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F532 Hack Nerd Font Mono

window_padding_width 12
scrollback_lines 10000
confirm_os_window_close 0

# tmux owns sessions/windows — hide Kitty's own tab bar
tab_bar_style hidden

# Transparency (macOS blurs the desktop behind the window)
background_opacity 0.90
background_blur 20

# Kanagawa Wave
background            #1F1F28
foreground            #DCD7BA
selection_background  #2D4F67
selection_foreground  #DCD7BA
cursor                #C8C093
cursor_text_color     #1F1F28

# Normal colors
color0  #16161D
color1  #C34043
color2  #76946A
color3  #C0A36E
color4  #7E9CD8
color5  #957FB8
color6  #6A9589
color7  #C8C093

# Bright colors
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E9C46A
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #DCD7BA
