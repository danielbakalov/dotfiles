format = """
$directory\
$git_branch\
$git_status\
$c\
$python\
$rust\
$golang\
$fill\
$cmd_duration\
$line_break\
$character\
"""

palette = "kanagawa"

[palettes.kanagawa]
blue = "#7E9CD8"
violet = "#957FB8"
green = "#98BB6C"
red = "#C34043"
yellow = "#C0A36E"
cyan = "#6A9589"
gray = "#727169"
dark = "#54546D"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "violet"
symbol = " "
format = "on [$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕⇡$ahead_count⇣$behind_count"
modified = "!$count"
untracked = "?$count"
staged = "+$count"
deleted = "✘$count"

[c]
style = "cyan"
symbol = " "
format = "[$symbol($version)]($style) "

[python]
style = "cyan"
symbol = " "
format = "[$symbol($version)]($style) "

[rust]
style = "cyan"
symbol = " "
format = "[$symbol($version)]($style) "

[golang]
style = "cyan"
symbol = " "
format = "[$symbol($version)]($style) "

[cmd_duration]
style = "gray"
format = "[$duration]($style) "
min_time = 2_000

[fill]
style = "dark"
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
