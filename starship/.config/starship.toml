format = """
$directory\
$c\
$python\
$rust\
$golang\
$character\
"""

palette = "gruvbox_material"

[palettes.gruvbox_material]
blue = "#7daea3"
violet = "#d3869b"
green = "#a9b665"
red = "#ea6962"
yellow = "#d8a657"
cyan = "#89b482"
gray = "#928374"
dark = "#665c54"

# Bare folder name only; stripping the ~ prefix makes the prompt just ❯ at home
# ("~/" must come before "~" — substitutions run in order, before truncation)
[directory]
style = "bold blue"
truncation_length = 1
format = "([$path]($style) )([$read_only]($read_only_style) )"

[directory.substitutions]
"~/" = ""
"~" = ""

[c]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[python]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[rust]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[golang]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
