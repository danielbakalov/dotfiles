format = """
$directory\
$git_branch\
$git_status\
$c\
$python\
$rust\
$golang\
$fill\
$cmd_duration\
$line_break\
$character\
"""

palette = "gruvbox_material"

[palettes.gruvbox_material]
blue = "#7daea3"
violet = "#d3869b"
green = "#a9b665"
red = "#ea6962"
yellow = "#d8a657"
cyan = "#89b482"
gray = "#928374"
dark = "#665c54"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "violet"
symbol = " "
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕⇡$ahead_count⇣$behind_count"
modified = "!$count"
untracked = "?"
staged = "+$count"
deleted = "✘$count"

[c]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[python]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[rust]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[golang]
style = "cyan"
symbol = " "
format = "[$symbol]($style)"

[cmd_duration]
style = "gray"
format = "[$duration]($style) "
min_time = 2_000

[fill]
style = "dark"
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
