unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Name windows by current directory, not the running command
set -g automatic-rename off

# Meaningful OS window title (kitty titlebar shows this instead of "tmux")
set -g set-titles on
set -g set-titles-string "#S · #{b:pane_current_path}"

# Faster key repetition
set -s escape-time 0

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Gruvbox Material status bar — flat blocks, no powerline separators
set -g status-position top
set -g status-style "bg=#282828,fg=#d4be98"
set -g status-left "#[bg=#a9b665,fg=#282828,bold] #S #[default] "
set -g status-right "#[fg=#928374]%H:%M  %d %b "
set -g status-left-length 30
set -g status-right-length 30
set -g window-status-format "#[fg=#928374] #I:#{b:pane_current_path} "
set -g window-status-current-format "#[bg=#45403d,fg=#d8a657,bold] #I:#{b:pane_current_path} "
set -g pane-border-style "fg=#45403d"
set -g pane-active-border-style "fg=#a9b665"
set -g message-style "bg=#45403d,fg=#d4be98"

# Dim inactive panes; active keeps the terminal default bg (stays translucent in kitty)
set -g window-style "bg=#1d2021"
set -g window-active-style "bg=default"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Autosave session every 15 min; restore it when tmux starts
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
