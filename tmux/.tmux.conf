unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Name windows by current directory, not the running command
set -g automatic-rename off

# Faster key repetition
set -s escape-time 0

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Kanagawa Wave status bar
set -g status-style "bg=#1F1F28,fg=#DCD7BA"
set -g status-left "#[bg=#7E9CD8,fg=#1F1F28,bold] #S #[bg=#1F1F28,fg=#7E9CD8,nobold]  "
set -g status-right "#[fg=#727169]%H:%M  %d %b "
set -g status-left-length 30
set -g status-right-length 30
set -g window-status-format "#[fg=#727169] #I:#{b:pane_current_path} "
set -g window-status-current-format "#[bg=#2D4F67,fg=#7E9CD8,bold] #I:#{b:pane_current_path} "
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#7E9CD8"
set -g message-style "bg=#2D4F67,fg=#DCD7BA"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
